<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎓 Michael的小暑假</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
:root{--bg:#f5f0eb;--card:rgba(255,252,247,0.92);--accent:#4a80c4;--green:#10b981;--green-g:rgba(16,185,129,0.25);--orange:#f59e0b;--red:#ef4444;--text:#2c3e50;--dim:#8a9bb0;--border:rgba(180,160,130,0.15);--r:16px;--purple:#8b5cf6;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(180deg,#e8e0d8 0%,#f0ebe6 40%,#f5f0eb 100%);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;background-attachment:fixed;}
.wrap{max-width:480px;margin:0 auto;padding-bottom:100px;}

/* Header compact */
.hdr{background:url('header-bg.jpg') center center/cover no-repeat;min-height:220px;position:relative;overflow:hidden;border-radius:0 0 24px 24px;display:flex;flex-direction:column;justify-content:flex-start;align-items:center;padding:36px 20px 30px;text-align:center;}
.hdr::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(0,20,50,0.5));}
.hdr-text{position:relative;z-index:2;text-align:center;}
.hdr h1{font-size:24px;font-weight:900;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,0.3);margin-bottom:2px;}
.hdr .sub{font-size:11px;color:rgba(255,255,255,0.85);font-weight:600;letter-spacing:1.5px;}
.hdr .date-pill{position:absolute;bottom:16px;right:16px;z-index:2;padding:4px 10px;background:rgba(0,0,0,0.25);border-radius:10px;font-size:10px;color:rgba(255,255,255,0.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}

/* Top stats row */
.top-stats{display:flex;gap:8px;padding:12px 16px 4px;}
.ts{flex:1;background:var(--card);border-radius:14px;padding:12px 8px;text-align:center;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.ts .n{font-size:24px;font-weight:900;line-height:1;}.ts .n.g{color:var(--green);}.ts .n.a{color:var(--accent);}.ts .n.o{color:var(--orange);}
.ts .l{font-size:10px;color:var(--dim);margin-top:3px;}

/* Today card — hero */
.today-card{margin:12px 16px;background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,0.06);overflow:hidden;}
.tc-head{padding:16px 18px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.tc-head h2{font-size:17px;font-weight:800;display:flex;align-items:center;gap:6px;}
.tc-head .tc-date{font-size:12px;color:var(--dim);font-weight:600;}
.tc-head .tc-pct{font-size:13px;font-weight:800;color:var(--green);}
.tc-progress{height:4px;background:rgba(0,0,0,0.06);margin:0 18px;}
.tc-progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#34d399);border-radius:4px;transition:width 0.5s ease;}
.tc-tasks{padding:8px 18px 14px;}
.tc-empty{text-align:center;padding:20px 0;font-size:13px;color:var(--dim);}

/* Task item */
.ti{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.04);transition:all 0.2s;}
.ti:last-child{border-bottom:none;}
.ti.done{opacity:0.45;}.ti.done .ti-text{text-decoration:line-through;}
.ti-cb{width:24px;height:24px;border-radius:8px;border:2.5px solid rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;transition:all 0.2s ease;-webkit-user-select:none;user-select:none;}
.ti-cb:active{transform:scale(0.85);}
.ti-cb.done{background:var(--green);border-color:var(--green);box-shadow:0 0 12px var(--green-g);animation:popIn 0.3s ease;}
.ti-cb.done::after{content:'✓';color:#fff;font-size:15px;font-weight:800;}
@keyframes popIn{0%{transform:scale(0.5);}50%{transform:scale(1.2);}100%{transform:scale(1);}}
.ti-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px;}
.ti-info{flex:1;min-width:0;}
.ti-text{font-size:13px;line-height:1.5;}
.ti-meta{display:flex;gap:6px;margin-top:3px;align-items:center;}
.ti-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;}
.tag-k{background:rgba(239,68,68,0.08);color:#dc2626;}
.tag-d{background:rgba(74,128,196,0.08);color:var(--accent);}
.tag-s{background:rgba(139,92,246,0.08);color:var(--purple);}

/* Heat calendar */
.cal-section{margin:16px 16px 12px;}
.cal-section h3{font-size:14px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cal-nav h4{font-size:14px;font-weight:800;}
.cal-nav button{width:32px;height:32px;border-radius:10px;border:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--dim);}
.cal-nav button:active{transform:scale(0.9);}
.cal-wd{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
.cal-wd span{text-align:center;font-size:10px;font-weight:700;color:var(--dim);padding:2px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cd{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all 0.15s;font-weight:700;font-size:13px;min-height:40px;border:1.5px solid transparent;background:rgba(0,0,0,0.02);}
.cd:active{transform:scale(0.88);}
.cd.empty{background:transparent;cursor:default;}
.cd.today{border-color:var(--accent);background:rgba(74,128,196,0.06);}
.cd.sel{border-color:var(--green);box-shadow:0 0 0 3px var(--green-g);}
.cd.outside{opacity:0.25;cursor:default;pointer-events:none;}
/* Heat levels */
.cd.h0{background:rgba(0,0,0,0.02);}
.cd.h1{background:rgba(16,185,129,0.12);}
.cd.h2{background:rgba(16,185,129,0.25);}
.cd.h3{background:rgba(16,185,129,0.4);}
.cd.h4{background:rgba(16,185,129,0.55);color:#fff;}
.cd.travel-bg{background:linear-gradient(135deg,rgba(253,203,110,0.3),rgba(251,191,36,0.2));border-color:rgba(251,191,36,0.3);}
.cd .cd-flag{font-size:8px;line-height:1;margin-top:1px;}
.cd .cd-check{position:absolute;top:1px;right:2px;font-size:7px;}

/* Heat legend */
.heat-legend{display:flex;align-items:center;gap:4px;margin-top:8px;justify-content:flex-end;}
.heat-legend span.hl{font-size:9px;color:var(--dim);}
.heat-legend .hb{width:12px;height:12px;border-radius:3px;}

/* Detail panel */
.detail-panel{margin:0 16px 12px;background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,0.06);overflow:hidden;animation:slideUp 0.25s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.dp-head{padding:14px 18px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.dp-head h4{font-size:15px;font-weight:800;display:flex;align-items:center;gap:6px;}
.dp-head .dp-close{width:28px;height:28px;border-radius:8px;border:none;background:rgba(0,0,0,0.05);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--dim);}
.dp-body{padding:6px 18px 14px;}
.dp-travel{padding:6px 10px;background:linear-gradient(135deg,rgba(253,203,110,0.12),rgba(225,112,85,0.08));border-radius:8px;margin-bottom:8px;font-size:12px;font-weight:600;}
.dp-summary{font-size:11px;color:var(--dim);margin-bottom:6px;}

/* Tabs */
.tabs{display:flex;gap:4px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:7px 14px;border-radius:12px;font-size:11px;font-weight:700;background:rgba(0,0,0,0.03);color:var(--dim);cursor:pointer;transition:all 0.15s;user-select:none;border:1px solid transparent;}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Content sections */
.sec{display:none;padding:0 16px 20px;}.sec.vis{display:block;}
.scard{background:var(--card);border-radius:var(--r);padding:12px 16px;margin-bottom:8px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.scard h3{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.song-c{background:linear-gradient(135deg,rgba(74,128,196,0.04),rgba(139,92,246,0.05));border:1px solid rgba(74,128,196,0.1);border-radius:10px;padding:8px 12px;margin-bottom:4px;display:flex;align-items:center;gap:10px;}
.song-i{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#4a80c4,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.song-n{font-size:13px;font-weight:600;}.song-a{font-size:10px;color:var(--dim);}
.bcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:6px;box-shadow:0 2px 8px rgba(0,0,0,0.03);}
.bcard .bt{font-size:14px;font-weight:700;font-style:italic;}.bcard .ba{font-size:10px;color:var(--dim);margin-top:2px;}.bcard .bw{font-size:11px;color:var(--green);margin-top:3px;line-height:1.4;}
.lr{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.lb{display:inline-flex;align-items:center;gap:2px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;text-decoration:none;transition:all 0.12s;}.lb:active{transform:scale(0.95);}

/* Cheer */
.cheer{margin:12px 16px;background:linear-gradient(160deg,rgba(255,252,247,0.92),rgba(248,240,228,0.85));border:1px solid var(--border);border-radius:var(--r);padding:20px 16px;text-align:center;position:relative;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.04);}
.cheer::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#e17055,#fdcb6e,#00b894,#0984e3,#8b5cf6);opacity:0.7;}
.cheer h3{font-size:15px;font-weight:800;margin-bottom:2px;}
.heart-btn{display:inline-flex;align-items:center;justify-content:center;width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,rgba(239,68,68,0.06),rgba(239,68,68,0.15));border:2px solid rgba(239,68,68,0.15);cursor:pointer;user-select:none;-webkit-user-select:none;transition:all 0.2s;flex-direction:column;box-shadow:0 4px 16px rgba(239,68,68,0.08);}
.heart-btn:active{transform:scale(0.9);}
.ebtn{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;user-select:none;-webkit-user-select:none;background:var(--card);border:1px solid var(--border);transition:all 0.12s;}.ebtn:active{transform:scale(0.8);}
.msg-b{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px 10px;margin-bottom:4px;text-align:left;font-size:12px;line-height:1.4;}.msg-b .mn{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:2px;}.msg-b .mt{font-size:9px;color:var(--dim);float:right;}

.reset-s{text-align:center;padding:12px 16px 20px;}
.reset-b{padding:8px 20px;background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.12);border-radius:10px;color:#dc2626;font-size:10px;font-weight:600;cursor:pointer;}

/* Float/toast/confetti */
.fe{position:fixed;font-size:28px;pointer-events:none;z-index:999;animation:fu 1.5s ease-out forwards;}
@keyframes fu{0%{opacity:1;transform:translateY(0) scale(1);}50%{opacity:.8;transform:translateY(-60px) scale(1.2);}100%{opacity:0;transform:translateY(-120px) scale(.6);}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);padding:10px 20px;background:var(--green);color:#fff;border-radius:14px;font-size:14px;font-weight:700;z-index:100;transition:transform 0.3s;white-space:nowrap;box-shadow:0 4px 20px var(--green-g);}.toast.show{transform:translateX(-50%) translateY(0);}
.cc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden;}.cp{position:absolute;width:8px;height:8px;border-radius:2px;animation:cf 2s ease-out forwards;}
@keyframes cf{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}

/* Time blocks in daily schedule */
.tb{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.04);}.tb:last-child{border-bottom:none;}
.tl{width:50px;flex-shrink:0;font-size:11px;font-weight:600;color:var(--accent);padding-top:2px;}
.td{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.tc{flex:1;}.tc .tt{font-size:13px;font-weight:600;margin-bottom:2px;}.tc .tdesc{font-size:11px;color:var(--dim);line-height:1.4;}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr">

</div>

<!-- Selected day detail -->
<div id="detailWrap"></div>

<!-- Tabs for other content -->
<div class="tabs">

<!-- Cheer -->
<div class="cheer">

    <input id="cMsg" type="text" placeholder="写一句鼓励的话..." maxlength="50" style="flex:1;padding:7px 12px;border-radius:10px;border:1px solid var(--border);background:rgba(255,252,247,0.6);font-size:12px;color:var(--text);outline:none;font-family:inherit;"/>
    <button onclick="sendMsg()" style="padding:7px 14px;border-radius:10px;border:none;background:linear-gradient(135deg,#4a80c4,#5a94d6);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">发送</button>
  </div>

<div class="reset-s"><button class="reset-b" onclick="resetAll()">🔄 重置所有数据</button></div>
</div><!-- /wrap -->

<script>
const S=new Date(2026,3,20),E=new Date(2026,7,10);
const TV=[{s:new Date(2026,4,3),e:new Date(2026,4,7),f:'🇯🇵',n:'北海道'},{s:new Date(2026,5,18),e:new Date(2026,6,18),f:'🇺🇸',n:'圆石滩'}];
const SM={math:{l:'数学',c:'#e17055'},eng:{l:'英语',c:'#0984e3'},sci:{l:'理化',c:'#00b894'},piano:{l:'钢琴',c:'#a29bfe'},vlog:{l:'Vlog',c:'#fd79a8'},act:{l:'活动',c:'#fdcb6e'},sport:{l:'运动',c:'#06b6d4'},speech:{l:'演讲',c:'#f472b6'}};
function tv(d){for(const t of TV)if(d>=t.s&&d<=t.e)return t;return null;}
function wn(d){const diff=(d-S)/864e5;if(diff<0)return 0;return Math.min(16,Math.floor(diff/7)+1);}
function dow(d){const w=d.getDay();return w===0?7:w;}
function ds(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

const DR=[{s:'math',t:'__MATH__',k:1,tm:'09:00',dur:'90min'},{s:'eng',t:'📖 词汇书 1 Chapter',k:1,tm:'10:45',dur:'30min'},{s:'eng',t:'🇬🇧 英语阅读/精听',tm:'11:15',dur:'30min'},{s:'eng',t:'__SONG__',tm:'14:00',dur:'30min'},{s:'eng',t:'📖 英文书阅读',tm:'14:30',dur:'30min'},{s:'piano',t:'🎹 钢琴练习',tm:'20:00',dur:'30min'},{s:'eng',t:'📖 睡前轻松阅读',tm:'21:00',dur:'30min'}];

// ===== MATH DAILY CURRICULUM =====
// IGCSE 0580 Extended, ~65 workdays mapped to topic progression
const MATH_DAYS=[
// W1 Number基础
{t:'🔢 诊断测试：做一套IGCSE真题找薄弱点',n:'计时2h，标注每题用时'},
{t:'🔢 整数性质：HCF/LCM/质因数分解',n:'短除法，练到3min内'},

{t:'🔢 分数四则运算+混合运算',n:'注意括号优先级'},
{t:'🔢 分数/小数/百分数互换20题',n:'速度训练：每题<1min'},
// W2 Number进阶
{t:'🔢 Standard Form科学记数法',n:'1≤a<10, a×10^n'},

  while(cursor<=d){const dw=dow(cursor),tr=tv(cursor);if(!tr&&dw<=5)mday++;cursor.setDate(cursor.getDate()+1);}

  if(idx>=MATH_DAYS.length)return '🔢 自由复习：挑薄弱模块刷题';

// Get today's song task text based on date
function getSongTask(d){
  const diffDays=Math.floor((d-S)/864e5);
  if(diffDays<0)return {t:'🎵 精听准备：建立歌单播放列表',step:''};
  // Count workdays (Mon-Fri only, skip travel light days)
  let workday=0;
  const cursor=new Date(S);
  while(cursor<=d){
    const dw=dow(cursor),tr=tv(cursor);
    if(!tr&&dw<=5) workday++;
    cursor.setDate(cursor.getDate()+1);
  }
  if(workday<=0)workday=1;
  const songIdx=Math.floor((workday-1)/3);
  const dayInSong=(workday-1)%3; // 0,1,2
  if(songIdx>=SONG_LIST.length) return {t:'🎵 自由精听：复习最喜欢的歌',step:''};
  const song=SONG_LIST[songIdx];
  const steps=['🎵 盲听「'+song.name+'」— '+song.artist+'（不看歌词，写下听到的词）','🎵 精读「'+song.name+'」歌词（标注生词+连读+弱读）','🎵 跟唱「'+song.name+'」录音（对比原唱，找差距）'];
  return {t:steps[dayInSong],step:dayInSong,goal:song.goal};
}

// Task render helper — timeline style
function taskHtml(ts,dstr){
  let lastTm='';

function renderCal(){
  const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('calTitle').textContent=`${calYear}年 ${mn[calMonth]}`;
  const g=document.getElementById('calGrid');
  const first=new Date(calYear,calMonth,1),last=new Date(calYear,calMonth+1,0);
  let sd=first.getDay();sd=sd===0?6:sd-1;
  const today=new Date();today.setHours(0,0,0,0);
  let h='';
  // Padding before
  for(let i=0;i<sd;i++){const pd=new Date(calYear,calMonth,1-sd+i);h+=`<div class="cd outside">${pd.getDate()}</div>`;}
  for(let d=1;d<=last.getDate();d++){
    const dt=new Date(calYear,calMonth,d);dt.setHours(0,0,0,0);
    const dstr=ds(dt),ts=tasks(dt),tr=tv(dt),isT=dt.getTime()===today.getTime(),isSel=selDay===dstr;
    let dn=0;ts.forEach((_,i)=>{if(ic(dstr,i))dn++;});
    const pct=ts.length?dn/ts.length:0;
    // Heat level — travel days skip heat, use travel-bg instead
    let hl='h0';if(!tr){if(pct>0&&pct<0.25)hl='h1';else if(pct>=0.25&&pct<0.5)hl='h2';else if(pct>=0.5&&pct<0.75)hl='h3';else if(pct>=0.75)hl='h4';}
    // Is in range?
    const inRange=dt>=S&&dt<=E;
    let cls=`cd ${inRange&&!tr?hl:''}${isT?' today':''}${isSel?' sel':''}${tr&&inRange?' travel-bg':''}${!inRange?' outside':''}`;
    h+=`<div class="${cls}" onclick="${inRange?`sel('${dstr}')`:''}">${d}${tr&&inRange?`<span class="cd-flag">${tr.f}😊</span>`:''}${dn===ts.length&&ts.length>0&&inRange&&!tr?'<span class="cd-check">✅</span>':''}</div>`;
  }
  // Padding after
  let ed=last.getDay();ed=ed===0?6:ed-1;

}

function enc(){const m=["✅ 打卡！","💪 继续！","🌟 漂亮！","🔥 猛！","⚡ 高效！","🎯 近一步！","🚀 冲！"];return m[~~(Math.random()*m.length)];}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2000);}
function mConf(){const c=document.getElementById('confetti'),cols=['#8b5cf6','#10b981','#fdcb6e','#e17055','#0984e3','#fd79a8'];for(let i=0;i<8;i++){const p=document.createElement('div');p.className='cp';p.style.left=(30+Math.random()*40)+'%';p.style.top='-10px';p.style.background=cols[~~(Math.random()*cols.length)];p.style.animationDelay=(Math.random()*0.3)+'s';c.appendChild(p);setTimeout(()=>p.remove(),2500);}}
function cBurst(){const c=document.getElementById('confetti'),cols=['#8b5cf6','#10b981','#fdcb6e','#e17055','#0984e3','#fd79a8'];for(let i=0;i<30;i++){const p=document.createElement('div');p.className='cp';p.style.left=(10+Math.random()*80)+'%';p.style.top='-10px';p.style.background=cols[~~(Math.random()*cols.length)];p.style.animationDelay=(Math.random()*0.8)+'s';p.style.width=(6+Math.random()*6)+'px';p.style.height=(6+Math.random()*6)+'px';c.appendChild(p);setTimeout(()=>p.remove(),3000);}}
function resetAll(){if(confirm('确定重置所有数据？')){st={t:{},sk:0,lc:null};sv();selDay=null;render();toast('🔄 已重置');}}
// Cheer
function lC(){try{return JSON.parse(localStorage.getItem('scie-cheer-v1'))||{count:0,emojis:[],messages:[]};}catch{return{count:0,emojis:[],messages:[]};}}
function sC(d){localStorage.setItem('scie-cheer-v1',JSON.stringify(d));}
function rC(){const d=lC();document.getElementById('cheerN').textContent=d.count;document.getElementById('eStream').innerHTML=(d.emojis||[]).slice(-30).map(e=>`<span>${e}</span>`).join('');const w=document.getElementById('msgW');w.innerHTML=(d.messages||[]).slice(-20).reverse().map(m=>`<div class="msg-b"><div class="mn">${esc(m.name)}<span class="mt">${m.time}</span></div>${esc(m.text)}</div>`).join('');}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function cheer(){const d=lC();d.count++;d.emojis.push('❤️');sC(d);rC();const b=document.getElementById('heartBtn');b.style.transform='scale(1.15)';setTimeout(()=>b.style.transform='',200);fE('❤️');}
function eCheer(e){const d=lC();d.count++;d.emojis.push(e);sC(d);rC();fE(e);}
function fE(e){const el=document.createElement('div');el.className='fe';el.textContent=e;el.style.left=(35+Math.random()*30)+'%';el.style.bottom='30%';document.body.appendChild(el);setTimeout(()=>el.remove(),1600);}
function sendMsg(){const i=document.getElementById('cMsg'),t=i.value.trim();if(!t)return;let n=localStorage.getItem('scie-cheer-name');if(!n){n=prompt('你的称呼？');if(!n)return;localStorage.setItem('scie-cheer-name',n);}const d=lC();const now=new Date();d.messages.push({name:n,text:t,time:`${now.getMonth()+1}.${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`});d.count++;sC(d);i.value='';rC();toast('💌 留言成功！');cBurst();}
